<div class="card p-4 shadow-sm mt-4 mb-4">
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
    <div>
      <h3 class="mb-0">Mi perfil</h3>
      <small class="text-muted">Panel del técnico</small>
    </div>
    <button class="btn btn-outline-danger btn-sm" (click)="cerrarSesion()">Cerrar sesión</button>
  </div>

  <div *ngIf="mensaje" class="alert alert-success">{{ mensaje }}</div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Nombre <span class="text-danger">*</span></label>
      <input class="form-control" [(ngModel)]="perfil.nombre">
    </div>
    <div class="col-md-6">
      <label class="form-label">Apellido</label>
      <input class="form-control" [(ngModel)]="perfil.apellido">
    </div>
    <div class="col-md-4">
      <label class="form-label">Celular</label>
      <input class="form-control" [(ngModel)]="perfil.telefono" maxlength="9" placeholder="9 dígitos">
    </div>
    <div class="col-md-4">
      <label class="form-label">Correo</label>
      <input class="form-control" [(ngModel)]="perfil.correo" disabled>
    </div>
    <div class="col-md-4">
      <label class="form-label">Cargo</label>
      <input class="form-control" [(ngModel)]="perfil.cargo" disabled>
    </div>
  </div>

  <div class="d-flex justify-content-end mt-4 gap-2">
    <a class="btn btn-outline-secondary" routerLink="/tecnico/panel">Volver al panel</a>
    <button class="btn btn-primary" (click)="guardar()" [disabled]="cargando">
      {{ cargando ? 'Guardando...' : 'Guardar cambios' }}
    </button>
  </div>
</div>
