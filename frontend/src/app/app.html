<div class="app-shell">
  <header class="app-topbar">
    <a class="brand" routerLink="/">
      <span class="brand-logo">
        <img src="assets/logo_meca.webp" class="top-logo" alt="Mecatronic Motors">
      </span>
      <span class="brand-text">Mecatronic Motors S.A.C.</span>
    </a>

    <div class="top-actions">
      <a
        *ngIf="role === 'Cliente' || role == null"
        class="cart-link"
        routerLink="/carrito"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 4h2l2.4 10.2a2 2 0 0 0 2 1.6h7.8a2 2 0 0 0 2-1.6L21 7H7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="10" cy="19" r="1.7" fill="currentColor"/>
          <circle cx="17" cy="19" r="1.7" fill="currentColor"/>
        </svg>
        <span *ngIf="cartCount > 0" class="cart-count">{{ cartCount }}</span>
      </a>

      <a *ngIf="role == null" class="login-link" routerLink="/login" routerLinkActive="active">
        Iniciar sesión
      </a>

      <div class="user-actions" *ngIf="role != null">
        <span class="user-name">{{ nombreUsuario ?? role }}</span>
        <button class="btn btn-sm btn-outline-light" type="button" (click)="logout()">
          Cerrar sesión
        </button>
      </div>
    </div>
  </header>

  <div class="app-body">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <!-- ===== CATÁLOGO Y CARRITO (visitantes y clientes) ===== -->
        <a *ngIf="role === 'Cliente' || role == null" routerLink="/catalogo" routerLinkActive="active">
          Catálogo
        </a>

        <!-- ===== SOLO CLIENTE LOGUEADO ===== -->
        <a *ngIf="role === 'Cliente'" routerLink="/cliente/reservas" routerLinkActive="active">Reservas</a>
        <a *ngIf="role === 'Cliente'" routerLink="/cliente/mis-pedidos" routerLinkActive="active">
          Mis pedidos
        </a>
        <a *ngIf="role === 'Cliente'" routerLink="/cliente/mis-reservas" routerLinkActive="active">
          Mis reservas
        </a>
        <a *ngIf="role === 'Cliente'" routerLink="/cliente/vehiculos" routerLinkActive="active">
          Mis vehículos
        </a>
        <a *ngIf="role === 'Cliente'" routerLink="/cliente/proformas" routerLinkActive="active">
          Proformas
        </a>
        <a *ngIf="role === 'Cliente'" routerLink="/cliente/perfil" routerLinkActive="active">
          Perfil
        </a>

        <!-- ===== INTERNO (Empleado / Admin) ===== -->
        <a *ngIf="role === 'Administrador' || role === 'Empleado'" routerLink="/admin/clientes" routerLinkActive="active">
          Clientes
        </a>
        <a *ngIf="role === 'Administrador' || role === 'Empleado'" routerLink="/admin/vehiculos" routerLinkActive="active">
          Vehículos
        </a>
        <a *ngIf="role === 'Administrador' || role === 'Empleado'" routerLink="/admin/servicios" routerLinkActive="active">
          Servicios
        </a>
        <a *ngIf="role === 'Administrador' || role === 'Empleado'" routerLink="/admin/ordenes" routerLinkActive="active">
          Órdenes
        </a>
        <a *ngIf="role === 'Administrador' || role === 'Empleado'" routerLink="/admin/tecnicos" routerLinkActive="active">
          Técnicos
        </a>
        <a *ngIf="role === 'Administrador' || role === 'Empleado'" routerLink="/admin/proforma" routerLinkActive="active">
          Proforma
        </a>
        <a *ngIf="role === 'Administrador' || role === 'Empleado'" routerLink="/admin/inventario/repuestos" routerLinkActive="active">
          Inventario
        </a>
        <a *ngIf="role === 'Administrador' || role === 'Empleado'" routerLink="/admin/ventas" routerLinkActive="active">
          Ventas
        </a>
        <a *ngIf="role === 'Administrador' || role === 'Empleado'" routerLink="/admin/reportes" routerLinkActive="active">
          Reportes
        </a>
        <a *ngIf="role === 'Administrador'" routerLink="/admin/usuarios" routerLinkActive="active">
          Usuarios
        </a>
      </nav>
    </aside>

    <main class="app-main">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<!-- chatbot solo para cliente -->
<app-chatbot *ngIf="role === 'Cliente'"></app-chatbot>
